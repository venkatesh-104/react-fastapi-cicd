name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with: 
          node-version : 20

      - name: Install Frontend Dependencies
        run: npm install

      - name: Run React Tests
        run: npm test -- --watchAll=false
              - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        run: |
          pip install -r backend/requirements.txt

      - name: Run Backend Tests
        run: |
          cd backend
          pytest

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and Push React Frontend
      - name: Build and Push React Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/react-fastapi-cicd:latest

      # Build and Push FastAPI Backend
      - name: Build and Push FastAPI Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/react-fastapi-backend:latest
