name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      # Checkout Repository
      - name: Checkout Source
        uses: actions/checkout@v4

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install Frontend Dependencies
      - name: Install Frontend Dependencies
        run: npm install

      # Run React Tests
      - name: Run React Tests
        run: npm test -- --watchAll=false

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install Backend Dependencies
      - name: Install Backend Dependencies
        run: pip install -r backend/requirements.txt

      # Run Backend Tests
      - name: Run Backend Tests
        run: |
          cd backend
          pytest

      # Install Flake8
      - name: Install Flake8
        run: pip install flake8

      # Run Python Code Quality
      - name: Run Python Code Quality
        run: flake8 backend --ignore=W291,W292 --count --statistics

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build and Push React Frontend
      - name: Build and Push React Frontend
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/react-fastapi-cicd:latest

      # Build and Push FastAPI Backend
      - name: Build and Push FastAPI Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/react-fastapi-backend:latest

  production-deploy:
    needs: docker-build-push
    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Production Approval
        run: echo "Production deployment approved"

      - name: Health Check
        run: |
          curl --fail http://3.106.116.180:8000/employees

  notify:
    needs: production-deploy
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "GitHub Actions Deployment Failed"
          to: venkatesh.official.2002@gmail.com
          from: GitHub Actions
          body: |
            Deployment Failed

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            Check GitHub Actions logs.

  rollback:
    needs: production-deploy
    if: failure()
    runs-on: ubuntu-latest

    steps:
      - name: Rollback Deployment
        run: |
          echo "Deployment failed!"
          echo "Starting rollback..."
          echo "Rollback completed successfully."
